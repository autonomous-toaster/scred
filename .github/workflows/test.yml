name: Tests

on:
  push:
    branches: [ main, feat/*, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Stable Rust: Core tests without SIMD
  test-stable:
    name: Test (Stable)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Build
        run: cargo build --release --verbose
      
      - name: Run tests
        run: cargo test --release --verbose
      
      - name: Run detector benchmarks
        run: cargo bench --bench simd_benchmark --release 2>&1 | tail -20

  # Nightly Rust: SIMD-accelerated tests
  test-nightly:
    name: Test (Nightly + SIMD)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [nightly]
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@nightly
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Build (with SIMD)
        run: cargo +nightly build --release --features simd-accel --verbose
      
      - name: Run tests (with SIMD)
        run: cargo +nightly test --release --features simd-accel --verbose
      
      - name: Run charset benchmarks (SIMD)
        run: cargo +nightly bench --release --features simd-accel --bench charset_simd 2>&1 | tail -30
      
      - name: Run detector benchmarks (SIMD)
        run: cargo +nightly bench --release --features simd-accel --bench simd_benchmark 2>&1 | tail -20

  # Linting
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      
      - uses: Swatinem/rust-cache@v2
      
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Format checking
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      
      - name: Check formatting
        run: cargo fmt --all -- --check
