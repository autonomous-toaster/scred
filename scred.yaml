# =============================================================================
# SCRED MITM Proxy Configuration
# =============================================================================
# Generated by: scred-mitm --generate-config
# 
# This is an EXHAUSTIVE configuration showing ALL available options.
# Save as: scred.yaml or ~/.scred/config.yaml
#
# Configuration Loading Order:
#   1. ~/.scred/config.yaml
#   2. ./scred.yaml  
#   3. Environment variables (SCRED_*)
#
# Quick Start:
#   1. Save this file: scred-mitm --generate-config > scred.yaml
#   2. Edit the file (enable features you need)
#   3. Run: scred-mitm
#
# Environment Variables:
#   export SCRED_MITM_LISTEN_PORT=8080
#   export SCRED_POLICY_ENABLED=true
#   export SCRED_POLICY_SEED=$(openssl rand -hex 32)
# =============================================================================

# -----------------------------------------------------------------------------
# POLICY CONFIGURATION (Placeholder Replacement)
# -----------------------------------------------------------------------------
# Allows containers to use placeholders instead of real secrets.
# The MITM proxy replaces placeholders at runtime.
#
# How it works:
#   1. App uses placeholder: OPENAI_API_KEY_abc123...
#   2. Proxy intercepts request to api.openai.com
#   3. Proxy replaces placeholder with real key from env
#   4. Response comes back with real key
#   5. Proxy replaces real key with placeholder in response
#
# Placeholders are deterministic: SHA-256(secret_name + seed)
# Same seed = same placeholders across restarts
# -----------------------------------------------------------------------------
policy:
  # Enable placeholder replacement (default: false)
  enabled: false
  
  # Seed for deterministic placeholder generation
  # CRITICAL: Use environment variable, never commit real seeds!
  # If not set, a random seed is generated (placeholders change each restart)
  seed: "$SCRED_POLICY_SEED"
  
  # Discovery API - containers fetch placeholders at startup
  # Endpoint: http://localhost:9998/placeholders
  # Returns: KEY=placeholder pairs, one per line
  discovery:
    enabled: true
    port: 9998
    path: /placeholders
  
  # Secret providers - where to find real secrets
  # Later providers override earlier ones
  providers:
    # Environment variable provider (most common)
    - type: env
      # Glob patterns to select env vars
      keys:
        - "*_API_KEY"      # OPENAI_API_KEY, STRIPE_API_KEY, etc.
        - "*_SECRET"       # AWS_SECRET, GITHUB_SECRET, etc.
        - "*_TOKEN"        # GITHUB_TOKEN, GITLAB_TOKEN, etc.
        - "AWS_*"          # All AWS keys
      
      # Or specify exact keys:
      # keys:
      #   - "OPENAI_API_KEY"
      #   - "AWS_ACCESS_KEY_ID"
      #   - "AWS_SECRET_ACCESS_KEY"
  
  # Which pattern types get placeholders
  # Patterns: aws-access-key, aws-secret-key, github-token, openai-api-key, etc.
  # Use glob: "*" = all, "aws-*" = AWS only, "openai-*" = OpenAI only
  patterns: ["*"]
  
  # WHERE to replace placeholders (fine-grained control)
  location:
    # Request path (placeholder → real secret)
    request_body: true        # JSON bodies, form data, etc.
    request_headers: true     # Authorization, X-Api-Key, etc.
    
    # Response path (real secret → placeholder)  
    response_body: true       # JSON responses, etc.
    response_headers: true    # Set-Cookie, etc.
    
    # Headers to KEEP as placeholders (never replace)
    # Useful for headers that get logged
    keep_headers: []
    # Example: keep_headers: ["Authorization"]
    
    # Headers to FORCE replace (override keep_headers)
    replace_headers: []

# -----------------------------------------------------------------------------
# REDACTION CONFIGURATION (Secret Detection & Masking)
# -----------------------------------------------------------------------------
# Detects and masks secrets in HTTP traffic for logging/debugging.
#
# Modes:
#   detect     - Log detected secrets, pass traffic unchanged
#   redact     - Replace secrets with [REDACTED:type]
#   passthrough - No detection, pass traffic unchanged
# -----------------------------------------------------------------------------
redaction:
  mode: redact
  
  # Pattern filter
  patterns:
    # Patterns to redact (glob syntax)
    redact:
      - "*"                  # Redact all detected secrets
    
    # Patterns to keep visible (not redacted)
    # Use for debugging or non-sensitive patterns
    keep: []
    # keep: ["public-*"]

# -----------------------------------------------------------------------------
# MITM PROXY CONFIGURATION
# -----------------------------------------------------------------------------
scred-mitm:
  listen:
    port: 8080              # Listening port
    address: "0.0.0.0"      # Bind address (0.0.0.0 = all interfaces)
  
  # Traffic filtering (default-deny whitelist)
  # Blocks all traffic except whitelisted domains
  traffic:
    enabled: false          # Set true to enable filtering
    
    # Allowed domains (glob patterns)
    allowed-domains:
      - "*"                 # Allow all (not recommended for production)
      # More restrictive:
      # - "*.openai.com"
      # - "api.github.com"
      # - "*.amazonaws.com"
  
  # TLS Certificate Configuration
  # Required for HTTPS interception
  ca-cert:
    # Auto-generate CA certificate
    generate: true
    
    # Cache directory for per-site certificates
    cache-dir: /tmp/scred-certs
    
    # Or specify custom certificate paths:
    # path: /etc/scred/ca.pem
    # key-path: /etc/scred/ca-key.pem
  
  # Upstream proxy (optional)
  # Route traffic through corporate proxy
  # upstream-proxy:
  #   url: "http://corporate-proxy:8080"

# -----------------------------------------------------------------------------
# PER-HOST POLICIES (Override global settings)
# -----------------------------------------------------------------------------
# Different secrets/behavior for different upstream hosts
# -----------------------------------------------------------------------------
# policies:
#   # Example 1: OpenAI
#   - hosts:
#       - "*.openai.com"
#       - "api.openai.com"
#     
#     policy:
#       providers:
#         - type: env
#           keys: ["OPENAI_API_KEY"]
#       patterns: ["openai-*"]
#       location:
#         keep_headers: ["Authorization"]
#     
#     redaction:
#       mode: redact
#       patterns:
#         redact: ["*"]
#   
#   # Example 2: AWS
#   - hosts: ["*.amazonaws.com"]
#     policy:
#       providers:
#         - type: env
#           keys: ["AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY"]
#       patterns: ["aws-*"]
#   
#   # Example 3: Development (no redaction)
#   - hosts: ["localhost", "*.local", "192.168.*"]
#     redaction:
#       mode: passthrough

# =============================================================================
# USAGE EXAMPLES
# =============================================================================
# Basic MITM proxy (no policy):
#   scred-mitm
#
# With policy:
#   export SCRED_POLICY_SEED=$(openssl rand -hex 32)
#   scred-mitm --config scred.yaml
#
# Generate certificates only:
#   scred-mitm --generate-certs
#
# Test with curl:
#   curl --proxy http://localhost:8080 https://api.openai.com/v1/models
#
# List detected patterns:
#   scred-mitm --list-patterns
# =============================================================================
