version: '3.8'

services:
  # Simple echo/fake upstream that responds quickly
  fake-upstream:
    image: kennethreitz/httpbin
    container_name: fake-upstream
    ports:
      - "8080:80"
    environment:
      - GUNICORN_CMD_ARGS=--workers=4 --threads=2 --worker-class=gthread
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status/200"]
      interval: 1s
      timeout: 1s
      retries: 3
      start_period: 2s

  # scred-proxy (will be started manually for testing)
  scred-proxy:
    build:
      context: .
      dockerfile: crates/scred-proxy/Dockerfile
    container_name: scred-proxy
    ports:
      - "9999:9999"
    environment:
      - SCRED_PROXY_UPSTREAM_URL=http://fake-upstream:80
      - SCRED_PROXY_LISTEN_PORT=9999
      - SCRED_PROXY_LISTEN_ADDR=0.0.0.0
      - RUST_LOG=info
    depends_on:
      fake-upstream:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/status/200"]
      interval: 1s
      timeout: 1s
      retries: 3
      start_period: 2s
