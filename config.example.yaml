# SCRED HTTP/2 MITM Proxy Configuration
# 
# This configuration file controls the behavior of the SCRED proxy.
# All settings can be overridden with environment variables using uppercase keys
# (e.g., SCRED_PROXY_LISTEN, SCRED_TLS_CA_KEY, etc.)

proxy:
  # Listen address and port for incoming client connections
  listen: "127.0.0.1:8080"
  
  # Upstream proxy address (for corporate environments)
  # Leave empty for direct connections to upstream servers
  # Example: "http://corporate-proxy.example.com:3128"
  upstream: ""
  
  # Upstream connection timeout (ISO 8601 format or seconds)
  upstream_timeout: "30s"
  
  # Maximum concurrent connections
  max_connections: 1000
  
  # Whether to redact sensitive data in response bodies
  redact_responses: true
  
  # Whether to redact sensitive headers in HTTP/2 requests
  h2_redact_headers: true
  
  # HTTP/2 to HTTP/1.1 Transparent Downgrade
  # When enabled: MITM will attempt to read HTTP/2 frames from upstream
  #   servers and transcode them to HTTP/1.1 for downstream clients
  # When disabled (default): Returns 200 OK placeholder response (Phase 1 behavior)
  #
  # Set to true to enable full H2→H1.1 transcoding (Phase 2)
  # This allows HTTP/1.1 clients to work through MITM with HTTP/2 upstreams
  http2_downgrade: false

tls:
  # Path to CA private key (for certificate generation)
  ca_key: "~/.scred/ca.key"
  
  # Path to CA certificate
  ca_cert: "~/.scred/ca.pem"
  
  # Directory to cache generated certificates
  cert_cache_dir: "/tmp/scred-certs"

secrets:
  # Secret pattern detection configuration
  # Patterns from scred-redactor are used by default
  # Customize patterns here if needed
  enabled: true

logging:
  # Log level: trace, debug, info, warn, error
  level: "info"
  
  # Log format: json, pretty, or compact
  format: "json"
  
  # Log output: stderr or path to file
  output: "stderr"
