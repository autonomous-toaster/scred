version: '3.8'

services:
  # Backend API (httpbin) - simulates internal service
  httpbin:
    image: kennethreitz/httpbin:latest
    container_name: scred-httpbin
    ports:
      - "8000:80"
    environment:
      # Single worker to ensure sequential processing for testing
      GUNICORN_OPTS: "--workers=1 --worker-class=sync --bind 0.0.0.0:80"
    healthcheck:
      # Simple test: check if port is listening
      test: ["CMD-SHELL", "sh -c 'true' || exit 1"]
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 3s
    networks:
      - scred-network
    labels:
      - "com.scred.role=backend"

  # Reverse proxy (scred-proxy) - sits in front of httpbin
  # Selective redaction before secrets reach backend
  scred-proxy:
    build:
      context: ..
      dockerfile: Dockerfile.proxy
      args:
        RUST_BACKTRACE: 1
      x-build-memory: "2g"
    container_name: scred-proxy
    ports:
      - "9999:9999"
    environment:
      # Backend configuration
      SCRED_PROXY_UPSTREAM_URL: "http://httpbin:80"
      
      # Proxy configuration
      SCRED_PROXY_LISTEN_PORT: "9999"
      
      # Redaction settings
      SCRED_PROXY_REDACT_REQUEST: "true"
      SCRED_PROXY_REDACT_RESPONSE: "false"
      
      # Logging
      RUST_LOG: "debug"
    depends_on:
      httpbin:
        condition: service_healthy
    networks:
      - scred-network
    labels:
      - "com.scred.role=reverse-proxy"
      - "com.scred.port=9999"

  # MITM Proxy (scred-mitm) - transparent client proxy
  # Can be configured as HTTP_PROXY for client applications
  # Used for monitoring ALL traffic from clients
  scred-mitm:
    build:
      context: ..
      dockerfile: Dockerfile.mitm
      args:
        RUST_BACKTRACE: 1
      x-build-memory: "2g"
    container_name: scred-mitm
    ports:
      - "8888:8888"
    environment:
      # MITM proxy configuration
      SCRED_LISTEN: "0.0.0.0:8888"
      
      # Logging
      SCRED_LOG_LEVEL: "debug"
      SCRED_LOG_FORMAT: "json"
      
      # TLS configuration (auto-generated in /app/certs)
      SCRED_CERT_CACHE_DIR: "/app/certs"
      SCRED_REDACT_RESPONSES: "false"
    networks:
      - scred-network
    labels:
      - "com.scred.role=mitm-proxy"
      - "com.scred.port=8888"

  # Test client - for running automated tests
  test-client:
    image: curlimages/curl:latest
    container_name: scred-test-client
    depends_on:
      scred-proxy:
        condition: service_started
      scred-mitm:
        condition: service_started
    networks:
      - scred-network
    environment:
      # Client can use either proxy
      HTTP_PROXY: "http://scred-mitm:8888"
      HTTPS_PROXY: "http://scred-mitm:8888"
      NO_PROXY: "localhost,127.0.0.1"
    entrypoint: /bin/sh -c "while true; do sleep 3600; done"
    labels:
      - "com.scred.role=test-client"

networks:
  scred-network:
    name: scred-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  scred-certs:
    name: scred-certs

# Labels and metadata for documentation
x-scred-config:
  description: "SCRED testing stack with reverse proxy + MITM proxy + httpbin backend"
  components:
    - name: httpbin
      role: "Internal backend API"
      port: 8000
      url: "http://localhost:8000"
    
    - name: scred-proxy
      role: "Reverse proxy (selective redaction)"
      port: 9999
      url: "http://localhost:9999"
      description: "Sits in front of httpbin, selectively redacts secrets before backend receives them"
    
    - name: scred-mitm
      role: "MITM proxy (transparent client proxy)"
      port: 8888
      url: "http://scred-mitm:8888"
      description: "Can be used as HTTP_PROXY for client applications. Redacts all traffic."
  
  test_commands:
    - "Test reverse proxy: curl http://localhost:9999/get?api_key=sk-1234567890"
    - "Test MITM proxy: curl --proxy http://scred-mitm:8888 http://httpbin:80/get?api_key=sk-1234567890"
    - "Direct backend: curl http://localhost:8000/get?api_key=sk-1234567890"
