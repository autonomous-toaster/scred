version: '3.8'

services:
  # Fake Upstream Service - serves sensitive data files
  # Used for testing response-only redaction scenarios
  fake-upstream:
    image: python:3.11-slim
    container_name: scred-fake-upstream
    working_dir: /app
    volumes:
      - ./secrets.json:/app/secrets.json:ro
      - ./index.html:/app/index.html:ro
    command: python3 -m http.server 8001 --bind 0.0.0.0
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/secrets.json').read()\" || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s
    networks:
      - scred-network
    labels:
      - "com.scred.role=fake-upstream"
      - "com.scred.port=8001"
      - "com.scred.description=Serves sensitive data for testing response redaction"

  # Backend API (httpbin) - simulates internal service
  httpbin:
    image: kennethreitz/httpbin:latest
    container_name: scred-httpbin
    ports:
      - "8000:80"
    environment:
      # Single worker to ensure sequential processing for testing
      GUNICORN_OPTS: "--workers=1 --worker-class=sync --bind 0.0.0.0:80"
    healthcheck:
      # Simple test: check if port is listening
      test: ["CMD-SHELL", "sh -c 'true' || exit 1"]
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 3s
    networks:
      - scred-network
    labels:
      - "com.scred.role=backend"

