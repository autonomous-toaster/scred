# Policy Configuration Example for scred-proxy
# This replaces both policy.yaml and redaction.yaml with a single unified config

# Enable policy
enabled: true

# Seed for deterministic placeholder generation
seed: "${SCRED_POLICY_SEED}"

# Secret providers
providers:
  - type: env
    keys:
      - "*_API_KEY"
      - "*_SECRET"
      - "*_TOKEN"

# Discovery API for containers to fetch placeholders
discovery:
  enabled: true
  port: 9998

# Default rules (applied to all hosts unless overridden)
defaults:
  headers:
    Authorization: replace      # Replace placeholders with secrets
    "Proxy-Authorization": replace
    "*": redact                 # Redact all other headers
  
  body:
    request: redact
    response: redact
  
  patterns:
    redact: ["*"]
    keep: []

# Host-specific overrides
hosts:
  "*.openai.com":
    headers:
      Authorization: replace
      "*": redact

  "*.anthropic.com":
    headers:
      "X-Api-Key": replace
      "*": redact

# scred-proxy specific configuration
scred-proxy:
  listen:
    port: 9999
    address: "0.0.0.0"
  
  upstream:
    url: "http://backend:8080"
    timeout-secs: 30
    keep-alive: true
