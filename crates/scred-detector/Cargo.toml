[package]
name = "scred-detector"
version = "0.1.0"
edition = "2021"
authors = ["SCRED Team"]
license = "MIT"

[dependencies]
memchr = "2"
rayon = "1"
num_cpus = "1"
regex = "1"

[dev-dependencies]
criterion = "0.5"

[features]
default = []
simd-accel = []

[[bench]]
