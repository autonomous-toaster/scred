[[bench]]
name = "charset_simd"
harness = false

[[bench]]
name = "quick_simd"
harness = false

[[bench]]
name = "realistic"
harness = false

[[bench]]
name = "scaling"
harness = false

[[bench]]
name = "profile_methods"
harness = false

[[bench]]
name = "workload_variations"
harness = false

[[bench]]
name = "redaction"
harness = false

[[bench]]
name = "pattern_frequency"
harness = false
